services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:15-alpine
    container_name: coride_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: coride_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d coride_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis_cache:
    image: redis:alpine
    container_name: coride_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: coride_backend
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres_db:5432/coride_db?schema=public
      - REDIS_URL=redis://redis_cache:6379
      - JWT_SECRET=your_jwt_secret_key_here
      - CLOUDINARY_URL=cloudinary://your_key
      - PORT=5001
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Web Frontend Service
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: coride_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

